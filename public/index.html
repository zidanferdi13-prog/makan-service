<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendataan Makan Karyawan</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        font-family: Arial, sans-serif;
        transition: background-color 0.3s ease;
      }
      h1,
      h2,
      h3 {
        margin: 5px;
      }
      #rfidInput {
        opacity: 0;
        position: absolute;
      }
      #syncButton {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 24px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
      }
      #syncButton:hover {
        background-color: #45a049;
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
      }
      #syncButton:active {
        transform: scale(0.95);
      }
      #syncButton:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      
      .spinner-small {
        border: 3px solid #f3f3f3;
        border-top: 3px solid white;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        animation: spin 1s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .red-background {
        background-color: #ff0000 !important;
      }
      
      .red-background h2,
      .red-background h3,
      .red-background span {
        color: white !important;
      }
    </style>
  </head>
  <body>
    <button id="syncButton" onclick="syncData()">SYNC</button>
    
    <h2>Sistem Pendataan Makan Karyawan</h2>

    <input id="rfidInput" autofocus />

    <div style="margin-top: 10px">
      <h3><span id="nama">NAMA</span></h3>
      <h3><span id="message"></span></h3>
      <h3><span id="statusMakan"></span></h3>
    </div>

    <script>
      const input = document.getElementById("rfidInput");
      const namaKyw = document.getElementById("nama");
      const message = document.getElementById("message");
      const syncButton = document.getElementById("syncButton");
      const statusMakan = document.getElementById("statusMakan");
      var rfid = "";

      setInterval(() => input.focus(), 500);

      // Fungsi untuk sinkronisasi data
      async function syncData() {
        syncButton.disabled = true;
        syncButton.innerHTML = '<span class="spinner-small"></span>SYNCING...';
        
        try {
          const res = await fetch("http://localhost:3000/sync", {
            method: "POST",
            headers: { "Content-Type": "application/json" }
          });
          
          const result = await res.json();
          console.log("Sync result:", result);
          
          message.textContent = result.message || "Sinkronisasi berhasil!";
          setTimeout(() => {
            message.textContent = "";
          }, 3000);
        } catch (err) {
          console.error("Sync error:", err);
          message.textContent = "Gagal sinkronisasi!";
          setTimeout(() => {
            message.textContent = "";
          }, 3000);
        } finally {
          syncButton.disabled = false;
          syncButton.innerHTML = "SYNC";
        }
      }

      input.addEventListener("input", async () => {

        if (input.value.trim().length == 10) {
          rfid = input.value.trim();

          message.textContent = "";
          namaKyw.textContent = "";
          console.log(rfid, "=====");

      
          try {
            // const res = await fetch("https://services.ama.id/employee/makan", {
            const res = await fetch("http://localhost:3000/makan", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ rfid }),
            });
              
            const result = await res.json();
            console.log("response", result);

            if (result.data) {
              namaKyw.textContent = result.data.nama;

              if (result.message === "Scan diluar jam") {
                message.textContent = result.message;
              }

              // Update status makan
              let statusText = "";
              if (result.data.ismakan && result.data.actual_makan) {
                statusText = "Silahkan Makan";
                document.body.classList.remove('red-background');
              } else if (result.data.ismakan) {
                statusText = "Anda Terdaftar Makan";
                document.body.classList.remove('red-background');
              } else if (result.data.actual_makan) {
                statusText = "Anda Tidak Terdaftar Makan";
                document.body.classList.add('red-background');
                // Reset background setelah 3 detik
                setTimeout(() => {
                  document.body.classList.remove('red-background');
                  namaKyw.textContent = "NAMA";
                  statusMakan.textContent = "";
                }, 3000);
              } else {
                document.body.classList.remove('red-background');
              }
              statusMakan.textContent = statusText;

            } else {
              // namaKyw.textContent = "Tidak ditemukan";
              namaKyw.textContent = result.message || "";
            }
            rfid = "";
            input.value = ""
          } catch (err) {
            namaKyw.textContent = err;
            console.log("ERRORRR", err);
            rfid = "";
            input.value = ""
          }
          input.value = "";
        }
      });
    </script>
  </body>
</html>
