<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pendataan Makan Karyawan</title>
  <style>
    .main-card.red {
      background: #e53935 !important;
      box-shadow: 0 4px 16px rgba(229, 57, 53, 0.25);
      color: #fff !important;
      border: 2px solid #b71c1c;
      transition: background 0.3s, color 0.3s;
    }

    .main-card.red .nama,
    .main-card.red .message,
    .main-card.red .status-badge {
      color: #fff !important;
    }

    .main-card.red .status-badge {
      background: #b71c1c !important;
      box-shadow: 0 2px 8px rgba(183, 28, 28, 0.18);
    }

    body {
      background: #f7f7f7;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Roboto', Arial, sans-serif;
      transition: background-color 0.3s ease;
    }

    .main-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      padding: 28px 18px;
      width: 95vw;
      max-width: 340px;
      text-align: center;
      margin-top: 10px;
    }

    .nama {
      font-size: 2.1em;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 1.3em;
      font-weight: bold;
      margin: 10px 0;
      color: #fff;
      background: #4CAF50;
      box-shadow: 0 2px 8px rgba(76, 175, 80, 0.15);
      transition: background 0.3s;
    }

    .status-badge.red {
      background: #e53935;
      box-shadow: 0 2px 8px rgba(229, 57, 53, 0.15);
    }

    .message {
      font-size: 1.1em;
      color: #333;
      margin-bottom: 8px;
      min-height: 24px;
      transition: color 0.3s;
    }

    #syncButton {
      position: fixed;
      bottom: 18px;
      right: 18px;
      padding: 18px 28px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.3em;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(25, 118, 210, 0.15);
      transition: all 0.3s ease;
      z-index: 10;
    }

    #syncButton:active {
      transform: scale(0.97);
    }

    #syncButton:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    .spinner-small {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1976d2;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .fade {
      animation: fadein 0.5s;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #rfidInput {
      opacity: 0;
      position: absolute;
    }
  </style>
</head>

<body>
  <button id="syncButton" onclick="syncData()">
    <span style="vertical-align:middle;">&#x21bb;</span> SYNC
  </button>
  <input id="rfidInput" autofocus />
  <div class="main-card fade">
    <div class="nama" id="nama">NAMA</div>
    <div class="message" id="message"></div>
    <div>
      <span id="statusMakan" class="status-badge">-</span>
    </div>
  </div>

  <script>
    const input = document.getElementById("rfidInput");
    const namaKyw = document.getElementById("nama");
    const message = document.getElementById("message");
    const syncButton = document.getElementById("syncButton");
    const statusMakan = document.getElementById("statusMakan");
    var rfid = "";

    setInterval(() => input.focus(), 500);

    // Fungsi untuk sinkronisasi data
    async function syncData() {
      syncButton.disabled = true;
      syncButton.innerHTML = '<span class="spinner-small"></span>SYNCING...';
      try {
        const res = await fetch("/sync", {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });
        const result = await res.json();
        message.textContent = result.message || "Sinkronisasi berhasil!";
        message.classList.add('fade');
        setTimeout(() => {
          message.textContent = "";
          message.classList.remove('fade');
        }, 2500);
      } catch (err) {
        message.textContent = "Gagal sinkronisasi!";
        message.classList.add('fade');
        setTimeout(() => {
          message.textContent = "";
          message.classList.remove('fade');
        }, 2500);
      } finally {
        syncButton.disabled = false;
        syncButton.innerHTML = '<span style="vertical-align:middle;">&#x21bb;</span> SYNC';
      }
    }

    function normalizeMessage(message) {
      return String(message || "").trim().replace(/[.]+$/, "");
    }

    input.addEventListener("input", async () => {
      const mainCard = document.querySelector('.main-card');
      if (input.value.trim().length == 10) {
        rfid = input.value.trim();
        message.textContent = "";
        namaKyw.textContent = "";
        statusMakan.textContent = "-";
        statusMakan.classList.remove('red');
        statusMakan.classList.remove('fade');
        namaKyw.classList.remove('fade');
        message.classList.remove('fade');
        mainCard.classList.remove('red');
        try {
          const res = await fetch("/makan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rfid }),
          });
          const result = await res.json();
          if (result.nama) {
            namaKyw.textContent = result.nama;
            namaKyw.classList.add('fade');
            const normalizedMessage = normalizeMessage(result.message);
            let statusText = normalizedMessage || "-";

            if (normalizedMessage === "Makan diambil") {
              statusText = "Silahkan Makan";
              statusMakan.classList.remove('red');
              mainCard.classList.remove('red');
            }
            else if (normalizedMessage === "Anda Belum Daftar Makan") {
              statusText = "Anda Belum Daftar Makan";
              statusMakan.classList.add('red');
              mainCard.classList.add('red');
            }
            else if (normalizedMessage === "Daftar makan") {
              statusText = "Anda Terdaftar Makan";
              statusMakan.classList.remove('red');
              mainCard.classList.remove('red');
            }
            else if (normalizedMessage === "Sudah tercatat") {
              statusText = "Sudah Tercatat";
              statusMakan.classList.remove('red');
              mainCard.classList.remove('red');
            }
            else {
              statusMakan.classList.remove('red');
              mainCard.classList.remove('red');
            }

            // Tampilkan shift jika ada
            if (result.shift) {
              statusText += " (Shift " + result.shift + ")";
            }

            statusMakan.textContent = statusText;
            statusMakan.classList.add('fade');
          } else {
            // Error response tanpa nama — tampilkan pesan asli dari backend
            const errorMsg = result.message || "Tidak ditemukan";
            namaKyw.textContent = errorMsg;
            namaKyw.classList.add('fade');
            message.textContent = "";
            statusMakan.textContent = "-";
            statusMakan.classList.add('red');
            statusMakan.classList.add('fade');
            mainCard.classList.add('red');
            setTimeout(() => {
              namaKyw.textContent = "NAMA";
              statusMakan.textContent = "-";
              message.textContent = "";
              statusMakan.classList.remove('red');
              mainCard.classList.remove('red');
              namaKyw.classList.remove('fade');
              statusMakan.classList.remove('fade');
            }, 2500);
          }
          rfid = "";
          input.value = "";
        } catch (err) {
          namaKyw.textContent = "ERROR";
          namaKyw.classList.add('fade');
          statusMakan.textContent = "-";
          statusMakan.classList.add('red');
          statusMakan.classList.add('fade');
          mainCard.classList.add('red');
          setTimeout(() => {
            namaKyw.textContent = "NAMA";
            statusMakan.textContent = "-";
            statusMakan.classList.remove('red');
            mainCard.classList.remove('red');
            namaKyw.classList.remove('fade');
            statusMakan.classList.remove('fade');
          }, 2500);
          rfid = "";
          input.value = "";
        }
      }
    });
  </script>
</body>

</html>
